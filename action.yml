name: Unplug Agent Scan
description: Scan changed agent and MCP config files in PRs with unplug-ai (regex-only Guard). Use actions/checkout with fetch-depth: 0 so origin/<base-ref> exists.
author: UnplugAI
branding:
  icon: shield
  color: blue

inputs:
  base-ref:
    description: Base branch name for git diff (e.g. main or dev)
    required: false
    default: main
  python-version:
    description: Python version for the scan job
    required: false
    default: "3.12"
  unplug-version:
    description: PyPI version constraint for unplug-ai
    required: false
    default: ">=0.3.1,<0.4"

runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        version: "0.6.14"

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install unplug-ai from PyPI
      shell: bash
      env:
        UNPLUG_VERSION: ${{ inputs.unplug-version }}
      run: uv pip install --system "unplug-ai${UNPLUG_VERSION}"

    - name: Scan changed agent files
      shell: bash
      env:
        BASE_REF: ${{ inputs.base-ref }}
      run: python -m unplug.cli.scan_pr --base-ref "$BASE_REF" --repo-root "$(git rev-parse --show-toplevel)"

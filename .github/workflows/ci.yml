name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate action metadata
        run: |
          test -f action.yml
          grep -q "Unplug Agent Scan" action.yml
          grep -q "composite" action.yml
